name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ./.github/workflows/build-wasm.yml
    with:
      release: true

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created }}
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      # Node 24 ships with npm 11.x, which supports OIDC trusted publishing
      # (added in npm 11.5.1). Avoids the in-place npm self-upgrade bug
      # (`MODULE_NOT_FOUND: promise-retry`) that bites Node 22's npm 10.x.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: cd ts && npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: occt-wasm-dist
          path: ts/dist/

      # Authenticates via OIDC trusted publisher configured on npmjs.com
      # (Settings -> Trusted Publisher Management -> GitHub Actions).
      # No NODE_AUTH_TOKEN needed - short-lived OIDC token issued per run.
      - name: Publish to npm
        run: cd ts && npm publish --provenance --access public
