name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['release_created'] }}
      tag_name: ${{ steps.release.outputs['tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

  publish:
    name: Build & Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (trusted publishing requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: |
          npm ci
          cd ts && npm ci

      - name: Fetch RapidJSON headers
        run: ./scripts/fetch-rapidjson.sh

      - name: Compute OCCT cache key
        id: occt-key
        run: echo "hash=$(git rev-parse HEAD:occt)-$(sha256sum xtask/src/build.rs | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache OCCT static libs
        id: occt-cache
        uses: actions/cache@v4
        with:
          path: occt/build
          key: occt-${{ steps.occt-key.outputs.hash }}

      - name: Build OCCT + facade → WASM
        run: cargo xtask build --release

      - name: Build TypeScript
        run: |
          cd ts
          npm run build
          cp ../dist/occt-wasm.js ../dist/occt-wasm.wasm dist/

      - name: Run tests
        run: cd ts && npx vitest run

      - name: Publish to npm (OIDC trusted publishing)
        run: cd ts && npm publish --provenance --access public
