name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  EMSDK_VERSION: "5.0.3"
  NODE_VERSION: "22"
  RUST_TOOLCHAIN: "1.85"

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ts/package-lock.json

      - name: Install TS dependencies
        run: cd ts && npm ci

      - name: TypeScript typecheck
        run: cd ts && npx tsc --noEmit

      - name: ESLint
        run: cd ts && npx eslint src/

  build-test:
    name: WASM Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ts/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd ts && npm ci

      - name: Fetch RapidJSON headers
        run: ./scripts/fetch-rapidjson.sh

      - name: Compute OCCT cache key
        id: occt-key
        run: |
          OCCT_REV=$(git rev-parse HEAD:occt)
          BUILD_HASH=$(sha256sum xtask/src/build.rs | cut -d' ' -f1)
          echo "hash=${OCCT_REV}-${BUILD_HASH}-emsdk${{ env.EMSDK_VERSION }}" >> "$GITHUB_OUTPUT"

      - name: Cache OCCT static libs
        uses: actions/cache@v4
        with:
          path: occt/build
          key: occt-${{ steps.occt-key.outputs.hash }}

      - name: Build OCCT + facade -> WASM
        run: cargo xtask build

      - name: Build TypeScript
        run: |
          cd ts
          npm run build
          cp ../dist/occt-wasm.js ../dist/occt-wasm.wasm dist/

      - name: Run tests
        run: npx vitest run

      - name: Run benchmarks & check for regressions
        run: npx vitest run test/bench.test.ts 2>&1 | node scripts/bench-check.js

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: occt-wasm-dist
          path: dist/
          retention-days: 7

  browser-smoke:
    name: Browser Smoke Test
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ts/package-lock.json

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: occt-wasm-dist
          path: dist/

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run browser smoke test
        run: npx playwright test
