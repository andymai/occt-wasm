name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v2.0.0)"
        required: true
        type: string

# Never cancel an in-flight publish: a half-run npm publish must finish.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build-wasm.yml
    with:
      release: true

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      # Node 24 ships with npm 11.x, which supports OIDC trusted publishing
      # (added in npm 11.5.1). Avoids the in-place npm self-upgrade bug
      # (`MODULE_NOT_FOUND: promise-retry`) that bites Node 22's npm 10.x.
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: cd ts && npm ci

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: occt-wasm-dist
          path: ts/dist/

      # Authenticates via OIDC trusted publisher configured on npmjs.com
      # (Settings -> Trusted Publisher Management -> GitHub Actions).
      # No NODE_AUTH_TOKEN needed - short-lived OIDC token issued per run.
      - name: Publish to npm
        run: cd ts && npm publish --provenance --access public
